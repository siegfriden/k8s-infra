---
- name: Create K3s cluster
  hosts: all
  become: true
  vars_files:
    - vars.yaml
  vars:
    ansible_user: root

  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Set inotify limits
      ansible.builtin.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: yes
      loop:
        - { key: "fs.inotify.max_user_instances", value: "8192" }
        - { key: "fs.inotify.max_user_watches", value: "131072" }

    # K3s

    - name: Copy K3s config files
      copy:
        src: files/k3s/
        dest: /etc/rancher/k3s/
        owner: root
        group: root
        mode: "0644"

    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      command: k3s kubectl get nodes
      register: k3s_ready
      retries: 10
      delay: 5
      until: k3s_ready.rc == 0
      changed_when: false

    # Gateway API

    - name: Install Gateway API CRDs
      command: >
        k3s kubectl apply --server-side -f
        https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.4.1/experimental-install.yaml
      changed_when: false

    # SSH

    - name: Configure users and SSH
      import_role:
        name: users

    - name: Install fail2ban dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-systemd
          - fail2ban
        state: present

    - name: Write fail2ban jail config
      copy:
        dest: /etc/fail2ban/jail.d/cloud-config.local
        content: |
          [sshd]
          enabled = true
          backend = systemd
          banaction = iptables-multiport
        owner: root
        group: root
        mode: "0644"
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: true
        state: started

  handlers:
    - name: Restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
