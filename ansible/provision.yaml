---
- name: Provision Hostinger server
  hosts: all
  become: true
  vars_files:
    - vars.yaml
  vars:
    ansible_user: root

  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    - name: Configure users and SSH
      import_role:
        name: users

    # fail2ban

    - name: Install fail2ban dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-systemd
          - fail2ban
        state: present

    - name: Write fail2ban jail config
      copy:
        dest: /etc/fail2ban/jail.d/cloud-config.local
        content: |
          [sshd]
          enabled = true
          backend = systemd
          banaction = iptables-multiport
        owner: root
        group: root
        mode: "0644"
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: true
        state: started

    # k3s

    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable=traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      command: k3s kubectl get nodes
      register: k3s_ready
      retries: 10
      delay: 5
      until: k3s_ready.rc == 0
      changed_when: false

    - name: Allow users to read kubeconfig
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: "0644"

  handlers:
    - name: Restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
