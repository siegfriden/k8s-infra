---
- name: Create K3s cluster
  hosts: all
  become: true
  vars_files:
    - vars.yaml
  vars:
    ansible_user: root

  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600

    # K3s

    - name: Copy K3s config files
      copy:
        src: files/k3s/
        dest: /etc/rancher/k3s/
        owner: root
        group: root
        mode: "0644"

    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      command: k3s kubectl get nodes
      register: k3s_ready
      retries: 10
      delay: 5
      until: k3s_ready.rc == 0
      changed_when: false

    # Cilium (CNI)

    - name: Install Helm
      shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install Cilium via Helm
      command: >
        helm install cilium oci://quay.io/cilium/charts/cilium
        --namespace kube-system
        --version 1.19.2
        --set operator.replicas=1
        --set kubeProxyReplacement=true
        --set k8sServiceHost=127.0.0.1
        --set k8sServicePort=6443
        --kubeconfig /etc/rancher/k3s/k3s.yaml
      register: cilium_install
      changed_when: "'has been upgraded' in cilium_install.stdout or 'has been installed' in cilium_install.stdout"

    - name: Wait for Cilium to be ready
      command: >
        k3s kubectl wait --for=condition=Ready
        pods -l app.kubernetes.io/name=cilium-agent
        -n kube-system --timeout=120s
      retries: 5
      delay: 10
      changed_when: false

    # SSH

    - name: Configure users and SSH
      import_role:
        name: users

    - name: Install fail2ban dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-systemd
          - fail2ban
        state: present

    - name: Write fail2ban jail config
      copy:
        dest: /etc/fail2ban/jail.d/cloud-config.local
        content: |
          [sshd]
          enabled = true
          backend = systemd
          banaction = iptables-multiport
        owner: root
        group: root
        mode: "0644"
      notify: Restart fail2ban

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: true
        state: started

  handlers:
    - name: Restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
