---
- name: Ensure at least one sudo user is defined
  assert:
    that: >
      users | selectattr('groups', 'defined') | selectattr('groups', 'contains', 'sudo') | list | length > 0
    fail_msg: "You must configure at least one user with 'sudo' in their groups to prevent lockout."

- name: Create users
  user:
    name: "{{ item.name }}"
    groups: "{{ item.groups }}"
    append: true
    shell: /bin/bash
    create_home: true
    state: present
  loop: "{{ users }}"

- name: Add SSH authorized keys
  authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.ssh_key }}"
    state: present
    exclusive: true
  loop: "{{ users }}"

- name: Grant passwordless sudo
  copy:
    dest: "/etc/sudoers.d/{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
  loop: "{{ users | selectattr('sudo_nopasswd', 'true') | list }}"

- name: Write SSH drop-in config
  copy:
    dest: /etc/ssh/sshd_config.d/99-ansible.conf
    content: |
      PermitRootLogin no
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      X11Forwarding no
      AllowTcpForwarding yes
      AllowAgentForwarding no
      AllowUsers {{ users | map(attribute='name') | join(' ') }}
      MaxAuthTries 1
    owner: root
    group: root
    mode: "0600"
  notify: Restart sshd
