apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 24h
  url: https://kyverno.github.io/kyverno

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: kyverno
  install:
    createNamespace: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: kyverno
      version: "3.*"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  values:
    backgroundController:
      rbac:
        clusterRole:
          extraResources:
            - apiGroups:
                - ""
              resources:
                - namespaces
                - serviceaccounts
              verbs:
                - get
                - list
                - watch
                - update
                - patch
