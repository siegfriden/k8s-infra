apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - grafana.siegfrid.com

---
apiVersion: gateway.networking.k8s.io/v1
kind: XListenerSet
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main-gateway
    namespace: gateway
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: grafana.siegfrid.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-tls
      allowedRoutes:
        namespaces:
          from: Same
