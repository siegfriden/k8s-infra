apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: linkerd-viz
  namespace: linkerd-viz
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - linkerd.siegfrid.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 8084

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: linkerd-viz-auth
  namespace: linkerd-viz
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: linkerd-viz
  basicAuth:
    users:
      name: linkerd-viz-auth

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: linkerd-viz-auth
  namespace: linkerd-viz
spec:
  encryptedData:
    .htpasswd: 
  template:
    metadata:
      name: linkerd-viz-auth
      namespace: linkerd-viz
    type: Opaque
