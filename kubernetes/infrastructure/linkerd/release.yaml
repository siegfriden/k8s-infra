apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: linkerd
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.linkerd.io/edge

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-crds
  namespace: linkerd
spec:
  interval: 30m
  targetNamespace: linkerd
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-crds
      version: "2025.*"
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: linkerd
spec:
  dependsOn:
    - name: linkerd-crds
  interval: 30m
  targetNamespace: linkerd
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-control-plane
      version: "2025.*"
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    identity:
      externalCA: true
      issuer:
        scheme: kubernetes.io/tls
  valuesFrom:
    - kind: Secret
      name: linkerd-trust-anchor
      valuesKey: ca.crt
      targetPath: identityTrustAnchorsPEM
    - kind: Secret
      name: linkerd-trust-anchor
      valuesKey: ca.crt
      targetPath: identity.issuer.caBundle

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-viz
  namespace: linkerd
spec:
  dependsOn:
    - name: linkerd-control-plane
  interval: 30m
  targetNamespace: linkerd-viz
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-viz
      version: "2025.*"
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    dashboard:
      enforcedHostRegexp: ".*"
