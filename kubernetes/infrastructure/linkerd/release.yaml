apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: linkerd
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.linkerd.io/edge

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-crds
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: linkerd
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-crds
      version: "2025.*"
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: linkerd
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-control-plane
      version: "2025.*"
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    identity:
      externalCA: true
      issuer:
        scheme: kubernetes.io/tls
