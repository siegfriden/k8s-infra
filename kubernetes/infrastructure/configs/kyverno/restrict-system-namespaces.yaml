apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-system-namespaces
  annotations:
    policies.kyverno.io/title: Restrict System Namespaces
    policies.kyverno.io/category: Multi-tenancy
    policies.kyverno.io/description: >-
      Prevents non-admin users and service accounts from creating or 
      modifying workloads in core system namespaces.
spec:
  validationFailureAction: Enforce
  rules:
    - name: block-system-namespace-writes
      match:
        any:
          - resources:
              kinds:
                - Pod
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
              namespaces:
                - kube-system
                - flux-system
                - kyverno
                - cert-manager
                - monitoring
      exclude:
        any:
          - clusterRoles:
              - cluster-admin
          - subjects:
              - kind: Group
                name: system:masters
              - kind: ServiceAccount
                namespace: kube-system
              - kind: ServiceAccount
                namespace: flux-system
              - kind: ServiceAccount
                namespace: kyverno
              - kind: ServiceAccount
                namespace: cert-manager
              - kind: ServiceAccount
                namespace: monitoring
      validate:
        message: "Manually deploying workloads to system namespaces is forbidden. Use Flux or contact a cluster-admin."
        deny: {}
