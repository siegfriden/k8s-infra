apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 30m
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=65.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      ingress:
        enabled: false
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
      dashboards:
        default:
          linkerd-top-line:
            gnetId: 15474
            datasource: Prometheus
          linkerd-health:
            gnetId: 15486
            datasource: Prometheus
          linkerd-deployment:
            gnetId: 15475
            datasource: Prometheus
          linkerd-pod:
            gnetId: 15477
            datasource: Prometheus
          linkerd-service:
            gnetId: 15480
            datasource: Prometheus
          linkerd-namespace:
            gnetId: 15478
            datasource: Prometheus
    prometheus:
      prometheusSpec:
        scrapeInterval: 60s
        evaluationInterval: 60s
        retention: 7d
        walCompression: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        query:
          maxSamples: 10000000
          maxConcurrency: 10
        additionalScrapeConfigs:
          - job_name: "linkerd-controller"
            scrape_interval: 10s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - linkerd
                    - linkerd-viz
            relabel_configs:
              - source_labels:
                  - __meta_kubernetes_pod_container_port_name
                action: keep
                regex: admin-http
              - source_labels: [__meta_kubernetes_pod_container_name]
                action: replace
                target_label: component
            metric_relabel_configs:
              - source_labels: [__name__]
                regex: "go_(gc|memstats|threads|goroutines|info).*"
                action: drop
              - source_labels: [__name__]
                regex: "process_.*"
                action: drop
          - job_name: "linkerd-service-mirror"
            scrape_interval: 10s
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels:
                  - __meta_kubernetes_pod_label_linkerd_io_control_plane_component
                  - __meta_kubernetes_pod_container_port_name
                action: keep
                regex: linkerd-service-mirror;admin-http$
              - source_labels: [__meta_kubernetes_pod_container_name]
                action: replace
                target_label: component
          - job_name: "linkerd-proxy"
            scrape_interval: 10s
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels:
                  - __meta_kubernetes_pod_container_name
                  - __meta_kubernetes_pod_container_port_name
                  - __meta_kubernetes_pod_label_linkerd_io_control_plane_ns
                action: keep
                regex: ^linkerd-proxy;linkerd-admin;linkerd$
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
              - source_labels: [__meta_kubernetes_pod_label_linkerd_io_proxy_job]
                action: replace
                target_label: k8s_job
              - action: labeldrop
                regex: __meta_kubernetes_pod_label_linkerd_io_proxy_job
              - action: labelmap
                regex: __meta_kubernetes_pod_label_linkerd_io_proxy_(.+)
              - action: labeldrop
                regex: __meta_kubernetes_pod_label_linkerd_io_proxy_(.+)
              - action: labelmap
                regex: __meta_kubernetes_pod_label_linkerd_io_(.+)
              - action: labelmap
                regex: __meta_kubernetes_pod_label_(.+)
                replacement: __tmp_pod_label_$1
              - action: labelmap
                regex: __tmp_pod_label_linkerd_io_(.+)
                replacement: __tmp_pod_label_$1
              - action: labeldrop
                regex: __tmp_pod_label_linkerd_io_(.+)
              - action: labelmap
                regex: __tmp_pod_label_(.+)
            metric_relabel_configs:
              - source_labels: [__name__]
                regex: "go_(gc|memstats|threads|goroutines|info).*"
                action: drop
              - source_labels: [__name__]
                regex: "process_.*"
                action: drop
    prometheusOperator:
      prometheusConfigReloader:
        resources:
          requests:
            cpu: 10m
            memory: 25Mi
          limits:
            memory: 50Mi
    alertmanager:
      enabled: false
    cleanPrometheusOperatorObjectNames: true

    # Component-specific RAM tuning (dropping high-cardinality/low-value metrics)
    kubelet:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "process_.*"
            action: drop
          - sourceLabels: [__name__]
            regex: "kubelet_volume_stats_.*"
            action: drop
          - sourceLabels: [__name__]
            regex: "kubelet_(runtime_operations|pod_worker|cgroup_manager|pleg|http)_.*"
            action: drop

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "apiserver_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|apiserver_response_sizes_bucket"
            action: drop
          - sourceLabels: [__name__]
            regex: "apiserver_(admission|cel|crd|envelope|flowcontrol|storage|watch_events|webhooks)_.*"
            action: drop
          - sourceLabels: [__name__]
            regex: "aggregator_.*"
            action: drop

    kubeEtcd:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "etcd_(debugging|disk|server|request_duration_seconds_bucket).*"
            action: drop

    kubeControllerManager:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "workqueue_.*"
            action: drop

    kubeScheduler:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "scheduler_.*"
            action: drop

    kubeProxy:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop

    coreDns:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "coredns_dns_(request|response)_size_bytes_bucket"
            action: drop

    kube-state-metrics:
      prometheus:
        monitor:
          http:
            metricRelabelings:
              - sourceLabels: [__name__]
                regex: "go_(gc|memstats|threads|goroutines|info).*"
                action: drop

    prometheus-node-exporter:
      prometheus:
        monitor:
          metricRelabelings:
            - sourceLabels: [__name__]
              regex: "go_(gc|memstats|threads|goroutines|info).*"
              action: drop
