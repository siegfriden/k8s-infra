apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 30m
  releaseName: kube-prometheus-stack
  targetNamespace: monitoring
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=65.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      ingress:
        enabled: false
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
    prometheus:
      prometheusSpec:
        scrapeInterval: 60s
        evaluationInterval: 60s
        retention: 7d
        walCompression: true
        resources:
          requests:
            cpu: 100m
            memory: 400Mi
          limits:
            memory: 1Gi
        query:
          maxSamples: 10000000
          maxConcurrency: 10
    prometheusOperator:
      prometheusConfigReloader:
        resources:
          requests:
            cpu: 10m
            memory: 25Mi
          limits:
            memory: 50Mi
    alertmanager:
      enabled: false
    cleanPrometheusOperatorObjectNames: true

    # Component-specific RAM tuning (dropping high-cardinality/low-value metrics)
    kubelet:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "process_.*"
            action: drop
          - sourceLabels: [__name__]
            regex: "kubelet_volume_stats_.*"
            action: drop
          - sourceLabels: [__name__]
            regex: "kubelet_(runtime_operations|pod_worker|cgroup_manager|pleg|http)_.*"
            action: drop

    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "apiserver_request_duration_seconds_bucket|apiserver_request_sli_duration_seconds_bucket|apiserver_response_sizes_bucket"
            action: drop
          - sourceLabels: [__name__]
            regex: "apiserver_(admission|cel|crd|envelope|flowcontrol|storage|watch_events|webhooks)_.*"
            action: drop
          - sourceLabels: [__name__]
            regex: "aggregator_.*"
            action: drop

    kubeEtcd:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "etcd_(debugging|disk|server|request_duration_seconds_bucket).*"
            action: drop

    kubeControllerManager:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "workqueue_.*"
            action: drop

    kubeScheduler:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "scheduler_.*"
            action: drop

    kubeProxy:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop

    coreDns:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "go_(gc|memstats|threads|goroutines|info).*"
            action: drop
          - sourceLabels: [__name__]
            regex: "coredns_dns_(request|response)_size_bytes_bucket"
            action: drop

    kube-state-metrics:
      prometheus:
        monitor:
          http:
            metricRelabelings:
              - sourceLabels: [__name__]
                regex: "go_(gc|memstats|threads|goroutines|info).*"
                action: drop

    prometheus-node-exporter:
      prometheus:
        monitor:
          metricRelabelings:
            - sourceLabels: [__name__]
              regex: "go_(gc|memstats|threads|goroutines|info).*"
              action: drop
