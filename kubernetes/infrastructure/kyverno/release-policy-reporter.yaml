apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: policy-reporter
  namespace: flux-system
spec:
  interval: 24h
  url: https://kyverno.github.io/policy-reporter

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: kyverno
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: policy-reporter
      version: "3.*"
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
  values:
    metrics:
      enabled: true
    ui:
      enabled: true
    plugin:
      kyverno:
        enabled: true
