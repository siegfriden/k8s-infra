apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 24h
  type: oci
  url: oci://docker.io/envoyproxy

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: envoy-gateway-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: gateway-helm
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
        namespace: flux-system
